# Publishes the runtime image to GHCR so the homelab Kubernetes deployment
# (jamescurtin/lab-cluster) has a pinnable image to run. Trotto does not
# publish an official image and this fork tracks upstream trotto/go-links
# verbatim, so we build the upstream Dockerfile ourselves.
#
# Pushes on merges to master only (PRs build but do not push). The build
# itself is the gate: a non-building image never reaches the registry.
name: publish

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only needed when we intend to push (merges to master).
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # PRs build-only (verifies the Dockerfile) but do not push.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
